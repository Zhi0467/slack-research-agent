# Supervisor loop defaults.
# Any value can be overridden via environment variables (including .env).

# Runtime and sleep policy
: "${SESSION_MINUTES:=360}"
# Single cadence source for supervisor polling and monitor static/frontend refresh defaults.
: "${SLEEP_NORMAL:=120}"
: "${POLL_INTERVAL:=5}"
: "${WAITING_REFRESH_INTERVAL:=30}"
: "${PENDING_CHECK_INITIAL:=120}"
: "${PENDING_CHECK_MULTIPLIER:=2}"
: "${PENDING_CHECK_MAX:=600}"
: "${FAILURE_SLEEP_SEC:=120}"

# Transient transport/network recovery
: "${MAX_TRANSIENT_RETRIES:=3}"
: "${TRANSIENT_RETRY_INITIAL:=15}"
: "${TRANSIENT_RETRY_MULTIPLIER:=2}"
: "${TRANSIENT_RETRY_MAX:=300}"

# Auth failure backoff (e.g. expired OAuth token)
: "${AUTH_MAX_RETRIES:=5}"
: "${AUTH_RETRY_INITIAL:=60}"
: "${AUTH_RETRY_MULTIPLIER:=2}"
: "${AUTH_RETRY_MAX:=600}"

# Supervisor dispatch config
: "${MENTION_POLL_LIMIT:=10}"
: "${MENTION_MAX_PAGES:=25}"
: "${FINISHED_TTL_DAYS:=30}"
: "${MAX_INCOMPLETE_RETENTION:=259200}"
: "${REFLECT_INTERVAL_SEC:=86400}"
: "${MAINTENANCE_HOUR:=4}"
: "${WAITING_HUMAN_REPLY_LIMIT:=100}"
: "${COMPLETION_GATE:=high}"
: "${PROMPT_MEMORY_TOTAL_CHAR_LIMIT:=20000}"
: "${WORKER_ID:=$(hostname)-agent}"
# Public-facing agent name used in worker/reviewer prompts (e.g. "Murphy", "Terry").
: "${AGENT_NAME:=Murphy}"
: "${RUN_ONCE:=false}"
: "${DEFAULT_CHANNEL_ID:=}"
: "${MAX_CONCURRENT_WORKERS:=1}"

# Worker CLI commands (space-separated; parsed by shlex.split in Python)
: "${WORKER_CMD:=codex exec --yolo --ephemeral --skip-git-repo-check -}"
: "${DEV_REVIEW_CMD:=claude -p --dangerously-skip-permissions --mcp-config src/config/claude_mcp.json}"

# Tribune (independent quality reviewer, Gemini CLI)
: "${TRIBUNE_CMD:=gemini -m gemini-3.1-pro-preview -p '' -y --output-format text}"
: "${TRIBUNE_FALLBACK_MODELS:=gemini-3-flash,gemini-2.5-flash}"
: "${TRIBUNE_MAX_REVIEW_ROUNDS:=0}"
: "${TRIBUNE_MAX_REVIEWS_PER_THREAD:=4}"
: "${TRIBUNE_MAINT_ROUNDS:=0}"

# Slack API retry/backoff
: "${SLACK_API_MAX_RETRIES:=3}"
: "${SLACK_API_RETRY_INITIAL_SEC:=1.0}"
: "${SLACK_API_RETRY_MULTIPLIER:=2.0}"
: "${SLACK_API_RETRY_MAX_SEC:=30.0}"
: "${SLACK_API_TIMEOUT_SEC:=60}"

# Loop mode (continuous iteration)
: "${LOOP_MAX_DURATION_SEC:=18000}"
: "${LOOP_ITERATION_DELAY_SEC:=180}"

# Worker watchdog
: "${MCP_STARTUP_CHECK_SEC:=30}"
: "${MAX_WATCHDOG_RETRIES:=2}"
: "${MAX_CONSECUTIVE_EXIT_FAILURES:=3}"
: "${WORKER_IDLE_TIMEOUT_SEC:=900}"
: "${WORKER_TOOL_TIMEOUT_SEC:=14400}"

# Session resume (AGENT-025): persist codex sessions and resume on re-dispatch.
# When true, --ephemeral is stripped from WORKER_CMD for fresh dispatches so
# sessions persist.  Set to false to disable all session persistence behavior
# and restore exact WORKER_CMD execution.
: "${SESSION_RESUME_ENABLED:=true}"

# Merge-failure enforcement (annotation-only when false; downgrades done→waiting_human when true)
: "${MERGE_FAILURE_BLOCKS_DONE:=false}"

# Paths
: "${STATE_FILE:=.agent/runtime/state.json}"
: "${RUNNER_LOG:=.agent/runtime/logs/runner.log}"
: "${HEARTBEAT_FILE:=.agent/runtime/heartbeat.json}"
: "${LAST_SESSION_LOG:=.agent/runtime/logs/last_session.log}"
: "${SESSION_TEMPLATE:=src/prompts/session.md}"
: "${REFLECT_TEMPLATE:=src/prompts/maintenance_reflect.md}"
: "${DEVELOPER_REVIEW_TEMPLATE:=src/prompts/developer_review.md}"
: "${TRIBUNE_REVIEW_TEMPLATE:=src/prompts/tribune_review.md}"
: "${TRIBUNE_MAINTENANCE_TEMPLATE:=src/prompts/tribune_maintenance.md}"
: "${RUNTIME_PROMPT_FILE:=.agent/runtime/dispatch/prompt.md}"
: "${DISPATCH_TASK_FILE:=.agent/runtime/dispatch/task.json}"
: "${DISPATCH_OUTCOME_FILE:=.agent/runtime/dispatch/outcome.json}"
: "${OUTCOMES_DIR:=.agent/runtime/outcomes}"
: "${DISPATCH_DIR:=.agent/runtime/dispatch}"
: "${WORKTREE_DIR:=.agent/runtime/worktrees}"
: "${TASKS_DIR:=.agent/tasks}"
: "${MEMORY_FILE:=.agent/memory/memory.md}"
: "${LONG_TERM_GOALS_FILE:=.agent/memory/long_term_goals.md}"
: "${MEMORY_DAILY_DIR:=.agent/memory/daily}"
: "${USER_DIRECTORY_FILE:=.agent/memory/user_directory.json}"
: "${PROJECTS_DIR:=.agent/projects}"
: "${CONSULT_HISTORY_DIR:=.agent/runtime/consult_history}"
: "${JOBS_DIR:=.agent/runtime/jobs}"

# User profiles
: "${USER_PROFILES_DIR:=.agent/user_profiles}"
: "${USER_PROFILE_CHAR_LIMIT:=2000}"

# Bounded thread-context packing for worker prompts
: "${THREAD_CONTEXT_MAX_CHARS:=200000}"
: "${THREAD_CONTEXT_MAX_MESSAGES:=100}"
: "${THREAD_CONTEXT_PRESERVE_OBJECTIVE_CHARS:=1000}"

# Thread continuation: start new Slack thread when current thread is exhausted (AGENT-057)
: "${THREAD_CONTINUATION_THRESHOLD:=80}"

# Dashboard export (integrated daemon thread; replaces external bash loop)
: "${DASHBOARD_EXPORT_DIR:=dashboard-export}"
: "${DASHBOARD_EXPORT_ENABLED:=false}"
: "${DASHBOARD_GIT_PUSH:=false}"
: "${DASHBOARD_GIT_REMOTE:=origin}"
: "${DASHBOARD_GIT_BRANCH:=deploy}"
: "${DASHBOARD_CF_PAGES_ENABLED:=false}"
: "${DASHBOARD_CF_PAGES_PROJECT:=}"
: "${DASHBOARD_CF_PAGES_DIR:=.agent/runtime/public-site}"
: "${DASHBOARD_CF_PAGES_INTERVAL:=900}"
: "${DASHBOARD_GPU_MONITOR:=false}"
: "${DASHBOARD_GPU_NODE_ALIAS:=}"
: "${DASHBOARD_GPU_COMMAND_TIMEOUT:=4}"
